<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>List Property | PropertySetu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h2>PropertySetu</h2>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="#">Buy</a>
    <a href="#">Rent</a>
    <a href="list-property.html">List Property</a>
    <a href="#">Contact</a>
</nav>

<section class="section">
    <h2>List Your Property</h2>

    <form>
        <p>
            <input type="text" placeholder="Owner Name" required>
        </p>

        <p>
            <input type="text" placeholder="Property Title" required>
        </p>

        <p>
            <select required>
                <option value="">Select Property Type</option>
                <option>House</option>
                <option>Flat</option>
                <option>Plot</option>
                <option>Commercial</option>
            </select>
        </p>

        <p>
            <input type="number" placeholder="Price (₹)" required>
        </p>

        <p>
            <input type="text" placeholder="Area (sq ft)" required>
        </p>
        <p>
    <input type="number" id="length" placeholder="Length (ft)">
</p>

<p>
    <input type="number" id="width" placeholder="Width (ft)">
</p>

<p>
    <input type="text" id="totalArea" placeholder="Total Area (Auto Calculated)" readonly>
</p>

<p>
    <input type="text" placeholder="Location (Udaipur Area Name)">
</p>

<p>
    <input type="file" id="videoUpload" accept="video/*">
</p>

<div id="videoPreview"></div>

        <p>
            <textarea placeholder="Property Description"></textarea>
        </p>

        <p>
            <input type="file" multiple>
        </p>

        <p>
            <button type="submit">Submit Property</button>
        </p>
    </form>

</section>

<footer>
    © 2026 PropertySetu
</footer>
    
<script src="js/preview.js"></script>
    
</body>
</html>
