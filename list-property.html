<!DOCTYPE html>
<html>
<head>
<title>Add Property</title>
</head>
<body>

<h2>Add Property</h2>

<form id="propertyForm">

<input type="text" id="title" placeholder="Property Title" required><br><br>
<input type="text" id="location" placeholder="Location" required><br><br>
<input type="number" id="price" placeholder="Price" required><br><br>

<select id="type" required>
<option value="buy">Sale</option>
<option value="rent">Rent</option>
</select><br><br>

<input type="text" id="image" placeholder="Image URL" required><br><br>

<button type="submit">Add Property</button>

</form>

<script>

document.getElementById("propertyForm").addEventListener("submit", function(e){

    e.preventDefault();

    const property = {
        title: document.getElementById("title").value,
        location: document.getElementById("location").value,
        price: document.getElementById("price").value,
        type: document.getElementById("type").value,
        image: document.getElementById("image").value
    };

    let properties = JSON.parse(localStorage.getItem("properties")) || [];
    properties.push(property);
    localStorage.setItem("properties", JSON.stringify(properties));

    alert("Property Added Successfully");

    document.getElementById("propertyForm").reset();

});

</script>

</body>
</html>
