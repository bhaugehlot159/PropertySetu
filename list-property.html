<h2>List Your Property</h2>

<form>

<h3>🏠 Basic Info</h3>

<p>
<select required>
<option value="">Property Type</option>
<option>House</option>
<option>Flat</option>
<option>Villa</option>
<option>Plot</option>
<option>Agricultural Land</option>
<option>Commercial</option>
</select>
</p>

<p>
<select required>
<option value="">Sale / Rent</option>
<option>Sale</option>
<option>Rent</option>
</select>
</p>

<p><input type="number" placeholder="Price (₹)" required></p>
<p>
<select>
<option>Negotiable?</option>
<option>Yes</option>
<option>No</option>
</select>
</p>

<h3>📏 Size Details</h3>

<p><input type="number" placeholder="Plot Size (sq ft)"></p>
<p><input type="number" placeholder="Built-up Area"></p>
<p><input type="number" placeholder="Carpet Area"></p>
<p><input type="number" placeholder="Total Floors"></p>

<p>
<select>
<option>Facing</option>
<option>North</option>
<option>South</option>
<option>East</option>
<option>West</option>
</select>
</p>

<p>
<select>
<option>Furnished Status</option>
<option>Furnished</option>
<option>Semi Furnished</option>
<option>Unfurnished</option>
</select>
</p>

<h3>🛁 Extra Features</h3>

<p><input type="number" placeholder="Bedrooms"></p>
<p><input type="number" placeholder="Bathrooms"></p>
<p><input type="number" placeholder="Parking"></p>
<p><input type="text" placeholder="Nearby Landmark"></p>

<h3>📸 Media Upload</h3>

<p><input type="file" multiple required></p>
<p><input type="file" accept="video/*"></p>
<p><input type="file" placeholder="Upload Floor Plan"></p>

<h3>📝 Description</h3>

<p><textarea rows="5" placeholder="Property Description"></textarea></p>

<p><button type="submit">Submit Property</button></p>

</form>
