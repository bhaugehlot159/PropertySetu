<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PropertySetu | Trusted Agent Program</title>
  <link rel="stylesheet" href="../css/style.css?v=20260413d" />
  <link rel="stylesheet" href="../css/professional-folder.css?v=20260413d" />
  <style>
    .shell { padding: 34px 0 56px; }
    .hero { border: 1px solid #c6dcef; border-radius: 16px; background: linear-gradient(120deg, #0f466f, #2d6b8c); color: #eff8ff; padding: 20px; }
    .grid { margin-top: 14px; display: grid; gap: 12px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cardx { background: #fff; border: 1px solid #cbdef0; border-radius: 14px; padding: 14px; }
    .cardx h2 { margin: 0 0 8px; color: #124b73; font-size: 1.03rem; }
    .meta { color: #3a5770; margin: 4px 0; }
    .policy { font-size: .9rem; color: #1f4a6f; background: #eff7ff; border: 1px solid #c9dff2; border-radius: 8px; padding: 8px; margin: 8px 0; }
    .row { display: grid; gap: 6px; margin-top: 8px; }
    .row input { width: 100%; padding: 8px; border: 1px solid #c6dbee; border-radius: 8px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .mini-reviews { margin: 8px 0 0; padding-left: 18px; color: #2f4e68; }
    .status-line { margin-top: 12px; padding: 10px 12px; border: 1px solid #c6dbee; border-radius: 10px; color: #1f4a6f; background: #f5fbff; }
    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="ps-pro-surface">
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="../index.html">PropertySetu Udaipur</a>
      <nav>
        <a href="../index.html">Home</a>
        <a href="legal-help.html">Legal Help</a>
        <a href="premium-services.html">Premium Services</a>
        <a href="structure-hub.html">Structure</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <div class="container">
      <section class="hero">
        <h1>Trusted Agent Program</h1>
        <p>Verified local agents with rating, transparency and clear commission model.</p>
      </section>

      <section class="udaipur-gallery">
        <figure class="udaipur-shot">
          <img loading="lazy" src="https://cdn.pixabay.com/photo/2018/03/15/22/02/udaipur-3229676_640.jpg" alt="Udaipur local agent target neighborhoods" />
          <figcaption>Verified Local Agent Territories</figcaption>
        </figure>
        <figure class="udaipur-shot">
          <img loading="lazy" src="https://cdn.pixabay.com/photo/2018/08/17/11/01/india-3612588_1280.jpg" alt="Udaipur city and waterfront for property agent services" />
          <figcaption>High-trust Buyer-Seller Connect</figcaption>
        </figure>
        <figure class="udaipur-shot">
          <img loading="lazy" src="https://cdn.pixabay.com/photo/2020/12/11/22/05/udaipur-5824034_1280.jpg" alt="Udaipur skyline for transparent agent network" />
          <figcaption>Transparent Commission Model</figcaption>
        </figure>
      </section>

      <section id="agentGrid" class="grid"></section>
      <p id="agentStatus" class="status-line">Trusted Agent Program live hai: verified local agents + rating system + commission transparency + call masking.</p>
    </div>
  </main>

  <script src="../js/live-api.js"></script>
  <script>
    (() => {
      const live = window.PropertySetuLive || {};
      const allowDemoFallback = Boolean(live.allowDemoFallback);
      const agentGrid = document.getElementById('agentGrid');
      const agentStatus = document.getElementById('agentStatus');
      if (!agentGrid) return;

      const fallback = [
        { id: 'agent-1', name: 'Udaipur Prime Realty', area: 'Hiran Magri', rating: 4.6, reviewCount: 12, transparentCommission: '1.5%', verified: true, contactPolicy: 'No direct phone shown. Use in-app chat and call masking.' },
        { id: 'agent-2', name: 'Mewar Property Desk', area: 'Pratap Nagar', rating: 4.4, reviewCount: 9, transparentCommission: '2%', verified: true, contactPolicy: 'No direct phone shown. Use in-app chat and call masking.' },
      ];
      const AGENT_LOCAL_REVIEWS_KEY = 'propertySetu:agentReviewsLocal';
      const CALL_MASK_KEY = 'propertySetu:callMaskRequestsLocal';
      const reviewMap = {};

      const readJson = live.readJson || ((key, fallbackValue) => {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallbackValue;
        } catch {
          return fallbackValue;
        }
      });
      const writeJson = live.writeJson || ((key, value) => localStorage.setItem(key, JSON.stringify(value)));

      const setStatus = (msg) => {
        if (agentStatus) agentStatus.textContent = msg;
      };

      const toReviewSnippet = (agentId) => {
        const items = reviewMap[agentId] || [];
        if (!items.length) return '<li>No agent ratings yet.</li>';
        return items.slice(0, 2).map((item) => `<li><b>${item.userName || 'User'}</b>: ${Number(item.rating || 0).toFixed(1)}/5 ${item.comment ? `- ${item.comment}` : ''}</li>`).join('');
      };

      const render = (items) => {
        agentGrid.innerHTML = (items || []).map((item) => `
          <article class="cardx">
            <h2>${item.name}</h2>
            <p class="meta"><b>Area:</b> ${item.area}</p>
            <p class="meta"><b>Rating:</b> ${Number(item.rating || 0).toFixed(1)} / 5 (${item.reviewCount || 0} reviews)</p>
            <p class="meta"><b>Commission:</b> ${item.transparentCommission || 'N/A'}</p>
            <p class="meta"><b>Status:</b> ${item.verified ? 'Verified Agent' : 'Pending'}</p>
            <p class="policy"><b>Communication:</b> ${item.contactPolicy || 'No direct phone shown. Use in-app chat and call masking.'}</p>
            <p class="meta"><b>Commission Transparency:</b> ${item.commissionTransparency || `Disclosed upfront (${item.transparentCommission || 'N/A'})`}</p>
            <div class="actions">
              <button type="button" class="outline-btn dark-outline" data-agent-chat="${item.id}">In-app Chat</button>
              <button type="button" class="solid-btn" data-agent-mask="${item.id}">Request Call Mask</button>
            </div>
            <div class="row">
              <input type="number" min="1" max="5" step="1" placeholder="Rate agent (1-5)" data-agent-rating="${item.id}" />
              <input type="text" maxlength="160" placeholder="Short review comment" data-agent-comment="${item.id}" />
              <button type="button" class="solid-btn" data-agent-rate="${item.id}">Submit Agent Rating</button>
            </div>
            <ul class="mini-reviews">${toReviewSnippet(item.id)}</ul>
          </article>
        `).join('') || '<article class="cardx"><p>No agent record available.</p></article>';
      };

      const loadAgentReviews = async (agentId) => {
        if (!agentId) return [];
        if (live.request) {
          try {
            const response = await live.request(`/agents/${encodeURIComponent(agentId)}/reviews`);
            const items = Array.isArray(response?.items) ? response.items : [];
            reviewMap[agentId] = items;
            return items;
          } catch (error) {
            if (!allowDemoFallback) {
              reviewMap[agentId] = [];
              setStatus(`Live agent reviews fetch failed: ${String(error?.message || 'Unknown error')}`);
              return [];
            }
          }
        }
        if (!allowDemoFallback) {
          reviewMap[agentId] = [];
          return [];
        }
        const localItems = readJson(AGENT_LOCAL_REVIEWS_KEY, []).filter((item) => item.agentId === agentId);
        reviewMap[agentId] = localItems;
        return localItems;
      };

      const submitLocalAgentReview = (agentId, rating, comment) => {
        const all = readJson(AGENT_LOCAL_REVIEWS_KEY, []);
        all.unshift({
          id: `agent-local-${Date.now()}`,
          agentId,
          rating,
          comment,
          userName: 'Local User',
          createdAt: new Date().toISOString(),
          source: 'local-fallback',
        });
        writeJson(AGENT_LOCAL_REVIEWS_KEY, all.slice(0, 200));
      };

      const createLocalCallMask = (agentId) => {
        const all = readJson(CALL_MASK_KEY, []);
        const serial = String(all.length + 1).padStart(4, '0').slice(-4);
        const record = {
          id: `mask-local-${Date.now()}`,
          agentId,
          maskedNumber: `+91-98XXXX${serial}`,
          expiresAt: new Date(Date.now() + (30 * 60000)).toISOString(),
          source: 'local-fallback',
        };
        all.unshift(record);
        writeJson(CALL_MASK_KEY, all.slice(0, 100));
        return record;
      };

      const load = async () => {
        let items = fallback;
        if (!live.request) {
          if (!allowDemoFallback) {
            render([]);
            setStatus('Trusted agents load karne ke liye live backend required hai.');
            return;
          }
          items.forEach((item) => { reviewMap[item.id] = readJson(AGENT_LOCAL_REVIEWS_KEY, []).filter((review) => review.agentId === item.id); });
          render(items);
          setStatus('Live API unavailable. Trusted agents loaded in backup mode.');
          return;
        }
        try {
          const response = await live.request('/agents');
          items = response.items || fallback;
          await Promise.all((items || []).map((item) => loadAgentReviews(item.id)));
          render(items);
          setStatus('Trusted agents loaded from live server.');
        } catch (error) {
          if (!allowDemoFallback) {
            render([]);
            setStatus(`Trusted agents live fetch failed: ${String(error?.message || 'Unknown error')}`);
            return;
          }
          items.forEach((item) => { reviewMap[item.id] = readJson(AGENT_LOCAL_REVIEWS_KEY, []).filter((review) => review.agentId === item.id); });
          render(items);
          setStatus('Live fetch failed. Trusted agents loaded in backup mode.');
        }
      };

      agentGrid.addEventListener('click', async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const chatAgentId = target.getAttribute('data-agent-chat');
        if (chatAgentId) {
          window.location.href = `../user-dashboard.html?agentId=${encodeURIComponent(chatAgentId)}`;
          return;
        }

        const maskAgentId = target.getAttribute('data-agent-mask');
        if (maskAgentId) {
          const token = live.getAnyToken ? live.getAnyToken() : '';
          if (token && live.request) {
            try {
              const response = await live.request('/call-mask/request', {
                method: 'POST',
                token,
                data: {
                  agentId: maskAgentId,
                  reason: 'Trusted agent call request from agent program page.',
                },
              });
              const req = response?.request || {};
              setStatus(`Call mask active: ${req.maskedNumber || 'generated'} (expires: ${new Date(req.expiresAt).toLocaleString()}).`);
            } catch (error) {
              if (!allowDemoFallback) {
                setStatus(`Live call mask failed: ${error.message}`);
                return;
              }
              const localMask = createLocalCallMask(maskAgentId);
              setStatus(`Live call mask failed. Local mask issued: ${localMask.maskedNumber}. Reason: ${error.message}`);
            }
          } else {
            if (!allowDemoFallback) {
              setStatus('Call mask request ke liye login + live backend required hai.');
              return;
            }
            const localMask = createLocalCallMask(maskAgentId);
            setStatus(`Login/live unavailable. Local call mask issued: ${localMask.maskedNumber}.`);
          }
          return;
        }

        const rateAgentId = target.getAttribute('data-agent-rate');
        if (!rateAgentId) return;
        const ratingEl = agentGrid.querySelector(`[data-agent-rating="${rateAgentId}"]`);
        const commentEl = agentGrid.querySelector(`[data-agent-comment="${rateAgentId}"]`);
        const rating = Number(ratingEl?.value || 0);
        const comment = String(commentEl?.value || '').trim();
        if (rating < 1 || rating > 5) {
          setStatus('Rating submit karne ke liye 1 se 5 ke beech value deni hogi.');
          return;
        }
        const token = live.getAnyToken ? live.getAnyToken() : '';
        if (token && live.request) {
          try {
            await live.request(`/agents/${encodeURIComponent(rateAgentId)}/reviews`, {
              method: 'POST',
              token,
              data: { rating, comment },
            });
            setStatus('Agent rating submitted successfully.');
            await load();
          } catch (error) {
            if (!allowDemoFallback) {
              setStatus(`Live rating failed: ${error.message}`);
              return;
            }
            submitLocalAgentReview(rateAgentId, rating, comment);
            setStatus(`Live rating failed. Local rating saved: ${error.message}`);
            await load();
          }
        } else {
          if (!allowDemoFallback) {
            setStatus('Agent rating submit ke liye login + live backend required hai.');
            return;
          }
          submitLocalAgentReview(rateAgentId, rating, comment);
          setStatus('Login/live unavailable. Agent rating saved in backup mode.');
          await load();
        }
      });

      load();
    })();
  </script>
<script src="../js/folder-command-dock.js?v=20260413d"></script>
</body>
</html>
