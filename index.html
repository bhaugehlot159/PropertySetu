<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertySetu</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
<h2>PropertySetu</h2>
</header>

<section class="section">

<input type="text" id="searchInput" placeholder="Search Property...">

<select id="locationFilter">
<option value="all">All Locations</option>
<option value="Hiran Magri Sector 1">Hiran Magri Sector 1</option>
<option value="Ambamata">Ambamata</option>
<option value="Pratap Nagar">Pratap Nagar</option>
</select>

<input type="number" id="minPrice" placeholder="Min Price">
<input type="number" id="maxPrice" placeholder="Max Price">

<p id="noResult" style="display:none;color:red;font-weight:bold;">
No Property Found
</p>

</section>

<section class="section" id="propertyContainer">

<h2>Featured Properties</h2>

</section>

<script>

// LOAD SAVED PROPERTIES

document.addEventListener("DOMContentLoaded", function () {

    let properties = JSON.parse(localStorage.getItem("properties")) || [];
    const container = document.getElementById("propertyContainer");

    properties.forEach(function(property) {

        const card = document.createElement("div");
        card.className = "property-card";
        card.setAttribute("data-type", property.type);
        card.setAttribute("data-location", property.location);
        card.setAttribute("data-price", property.price);

        card.innerHTML = `
            <img src="${property.image}" width="200">
            <h3>${property.title}</h3>
            <p>Location: ${property.location}</p>
            <p>Price: ₹${property.price}</p>
            <button class="fav-btn" onclick="toggleFavorite(this)">❤️ Save</button>
            <a href="https://wa.me/919876543210?text=I am interested in ${property.title}" target="_blank">WhatsApp</a>
        `;

        container.appendChild(card);

    });

});

// MASTER FILTER

function applyFilters() {

    const searchValue = document.getElementById("searchInput").value.toLowerCase();
    const locationValue = document.getElementById("locationFilter").value.toLowerCase();
    const min = parseInt(document.getElementById("minPrice").value) || 0;
    const max = parseInt(document.getElementById("maxPrice").value) || Infinity;

    const cards = document.querySelectorAll(".property-card");
    const noResult = document.getElementById("noResult");

    let visibleCount = 0;

    cards.forEach(function(card) {

        const title = card.querySelector("h3").innerText.toLowerCase();
        const location = card.dataset.location.toLowerCase();
        const price = parseInt(card.dataset.price);

        const matchSearch = title.includes(searchValue);
        const matchLocation = (locationValue === "all") || (location === locationValue);
        const matchPrice = price >= min && price <= max;

        if (matchSearch && matchLocation && matchPrice) {
            card.style.display = "block";
            visibleCount++;
        } else {
            card.style.display = "none";
        }

    });

    noResult.style.display = visibleCount === 0 ? "block" : "none";
}

// EVENTS

document.getElementById("searchInput").addEventListener("input", applyFilters);
document.getElementById("locationFilter").addEventListener("change", applyFilters);
document.getElementById("minPrice").addEventListener("input", applyFilters);
document.getElementById("maxPrice").addEventListener("input", applyFilters);

// FAVORITE SYSTEM

function toggleFavorite(button) {

    const card = button.closest(".property-card");
    const title = card.querySelector("h3").innerText;

    let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

    if (favorites.includes(title)) {
        favorites = favorites.filter(item => item !== title);
        button.innerText = "❤️ Save";
    } else {
        favorites.push(title);
        button.innerText = "✅ Saved";
    }

    localStorage.setItem("favorites", JSON.stringify(favorites));
}

</script>

</body>
</html>
