<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertySetu</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}
header{background:#0d1b2a;color:white;padding:15px;display:flex;justify-content:space-between}
button{padding:8px 12px;background:#0d1b2a;color:white;border:none;cursor:pointer}
input,select,textarea{padding:8px;margin:5px 0;width:100%}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
.card{background:white;padding:15px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.hidden{display:none}
.badge{background:green;color:white;padding:3px 6px;font-size:12px;border-radius:4px}
</style>
</head>

<body>

<header>
<h2>PropertySetu</h2>
<div id="navArea"></div>
</header>

<div class="container">

<!-- AUTH SECTION -->

<div id="authSection">
<h3>Login</h3>
<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<h3>Register</h3>
<input id="regName" placeholder="Name">
<input id="regEmail" placeholder="Email">
<input id="regPhone" placeholder="Phone">
<input id="regPassword" type="password" placeholder="Password">
<select id="regRole">
<option value="buyer">Buyer</option>
<option value="seller">Seller</option>
</select>
<button onclick="register()">Register</button>
</div>

<!-- DASHBOARD -->

<div id="dashboard" class="hidden">
<h3>Seller Dashboard</h3>

<input id="title" placeholder="Property Title">
<input id="location" placeholder="Location">
<input id="price" placeholder="Price">
<select id="type">
<option value="buy">Buy</option>
<option value="rent">Rent</option>
</select>
<textarea id="description" placeholder="Description"></textarea>
<input type="file" id="imageUpload">
<label><input type="checkbox" id="featured"> Featured</label>
<button onclick="addProperty()">Add Property</button>
</div>

<hr>

<h2>All Properties</h2>
<div id="propertyList" class="grid"></div>

</div>

<script>

const API = "http://localhost:5000/api";

let token = localStorage.getItem("token");
let currentUser = null;

if(token){
    const payload = JSON.parse(atob(token.split('.')[1]));
    currentUser = payload;
    showDashboard();
}

function showDashboard(){
    document.getElementById("authSection").classList.add("hidden");
    document.getElementById("navArea").innerHTML =
        `<button onclick="logout()">Logout</button>`;
    if(currentUser.role === "seller"){
        document.getElementById("dashboard").classList.remove("hidden");
    }
}

function logout(){
    localStorage.removeItem("token");
    location.reload();
}

async function register(){
    const res = await fetch(API+"/auth/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            name:regName.value,
            email:regEmail.value,
            phone:regPhone.value,
            password:regPassword.value,
            role:regRole.value
        })
    });
    const data = await res.json();
    alert(data.message);
}

async function login(){
    const res = await fetch(API+"/auth/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            email:loginEmail.value,
            password:loginPassword.value
        })
    });
    const data = await res.json();
    if(data.token){
        localStorage.setItem("token",data.token);
        location.reload();
    }else{
        alert(data.message);
    }
}

async function addProperty(){
    const file = imageUpload.files[0];
    const reader = new FileReader();

    reader.onloadend = async function(){
        const imageBase64 = reader.result;

        const res = await fetch(API+"/properties",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer "+token
            },
            body:JSON.stringify({
                title:title.value,
                location:location.value,
                price:price.value,
                type:type.value,
                description:description.value,
                image:imageBase64,
                featured:featured.checked
            })
        });

        const data = await res.json();
        alert(data.message);
        loadProperties();
    };

    if(file) reader.readAsDataURL(file);
}

async function loadProperties(){
    const res = await fetch(API+"/properties");
    const data = await res.json();

    propertyList.innerHTML="";

    data.forEach(p=>{
        propertyList.innerHTML += `
        <div class="card">
            <img src="${p.image}" width="100%">
            <h3>${p.title} ${p.featured ? '<span class="badge">Featured</span>' : ''}</h3>
            <p>${p.location}</p>
            <p>₹ ${p.price}</p>
            <p>${p.description}</p>
        </div>`;
    });
}

loadProperties();

</script>

</body>
</html>
