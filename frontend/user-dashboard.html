<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertySetu – User Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f6f9; }
header { background:#0b3d91; color:white; padding:15px; text-align:center; font-size:24px; }
.container { max-width: 1000px; margin:20px auto; background:white; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
h2 { color:#0b3d91; margin-top:0; }
.property-card { border:1px solid #ccc; padding:10px; margin:10px 0; border-radius:6px; background:#fdfdfd; display:flex; justify-content:space-between; align-items:center; }
button { background:#0b3d91; color:white; padding:5px 10px; border:none; border-radius:4px; cursor:pointer; margin-left:5px; }
button:hover { background:#092f6d; }
.chat-box { border:1px solid #0b3d91; padding:10px; margin:10px 0; border-radius:6px; background:#e0ebf7; height:150px; overflow-y:auto; }
input[type=text], input[type=datetime-local] { padding:5px; width:70%; margin-right:5px; border-radius:4px; border:1px solid #ccc; }
</style>
  <link rel="stylesheet" href="css/professional-folder.css" />
</head>
<body>

<header>User Dashboard</header>

<div class="container">
<h2>Saved / Wishlist Properties</h2>
<div id="wishlist">
    <!-- Saved properties appear here -->
</div>
</div>

<div class="container">
<h2>Book Property Visit</h2>
<form id="visitForm">
    <select id="propertySelect">
        <option value="">Select Property</option>
        <option value="Luxury Villa Hiran Magri">Luxury Villa Hiran Magri</option>
        <option value="Farmhouse Ambamata">Farmhouse Ambamata</option>
    </select>
    <input type="datetime-local" id="visitDate" required>
    <button type="submit">Book Visit</button>
</form>
<div id="visitList"></div>
</div>

<div class="container">
<h2>Live Video Visit Requests</h2>
<div id="videoVisitList"></div>
</div>

<div class="container">
<h2>Chat with Owner / Seller</h2>
<p id="communicationPolicy">Direct phone/email sharing blocked hai. Sirf in-app chat + masked call flow allowed hai.</p>
<div class="chat-box" id="chatBox"></div>
<input type="text" id="chatInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

<div class="container">
<h2>Call Masking Requests</h2>
<button id="refreshCallMaskBtn" type="button">Refresh Call Masks</button>
<div id="callMaskList"></div>
</div>

<script src="js/live-api.js"></script>
<script>
(() => {
  const live = window.PropertySetuLive || {};
  const wishlistDiv = document.getElementById('wishlist');
  const visitForm = document.getElementById('visitForm');
  const visitList = document.getElementById('visitList');
  const videoVisitList = document.getElementById('videoVisitList');
  const propertySelect = document.getElementById('propertySelect');
  const visitDate = document.getElementById('visitDate');
  const chatBox = document.getElementById('chatBox');
  const chatInput = document.getElementById('chatInput');
  const callMaskList = document.getElementById('callMaskList');
  const refreshCallMaskBtn = document.getElementById('refreshCallMaskBtn');
  const queryParams = new URLSearchParams(window.location.search);
  const preselectPropertyId = String(queryParams.get('propertyId') || '').trim();

  const readJson = live.readJson || ((key, fallback) => {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch {
      return fallback;
    }
  });
  const writeJson = live.writeJson || ((key, value) => localStorage.setItem(key, JSON.stringify(value)));
  const formatPrice = (value) => `₹${Number(value || 0).toLocaleString('en-IN')}`;

  const MARKET_STATE_KEY = 'propertysetu-marketplace-state';
  const VISIT_KEY = 'propertySetu:userVisits';
  const VIDEO_VISIT_KEY = 'propertySetu:videoVisits';
  const CHAT_KEY = 'propertySetu:userChat';
  const CALL_MASK_KEY = 'propertySetu:callMaskRequestsLocal';
  const spamWords = ['earn money fast', 'click here', 'crypto double', 'free gift', 'urgent transfer', 'loan approved instant'];
  const directPhonePattern = /\+?\d[\d\s\-()]{8,}\d/;
  const directEmailPattern = /[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i;

  let listings = [];
  let activePropertyId = '';

  const getWishlistIds = () => readJson(MARKET_STATE_KEY, { wishlist: [] }).wishlist || [];

  const normalizeListing = (item) => ({
    id: item.id,
    title: item.title || 'Untitled',
    location: item.location || item.locality || 'Udaipur',
    price: Number(item.price || 0),
    city: item.city || 'Udaipur',
  });

  const renderWishlist = () => {
    const ids = getWishlistIds();
    const wishItems = ids
      .map((id) => listings.find((item) => item.id === id))
      .filter(Boolean);

    wishlistDiv.innerHTML = '';
    if (!wishItems.length) {
      wishlistDiv.innerHTML = '<p>No saved properties in wishlist yet.</p>';
      return;
    }

    wishItems.forEach((item) => {
      const card = document.createElement('div');
      card.className = 'property-card';
      card.innerHTML = `
        <span><b>${item.title}</b><br>${item.location} • ${formatPrice(item.price)}</span>
        <button data-remove-id="${item.id}" type="button">Remove ❌</button>
      `;
      wishlistDiv.appendChild(card);
    });
  };

  const renderPropertySelect = () => {
    propertySelect.innerHTML = '<option value="">Select Property</option>';
    listings.forEach((item) => {
      const option = document.createElement('option');
      option.value = item.id;
      option.textContent = `${item.title} (${item.location})`;
      propertySelect.appendChild(option);
    });
    if (preselectPropertyId && listings.some((item) => item.id === preselectPropertyId)) {
      propertySelect.value = preselectPropertyId;
      activePropertyId = preselectPropertyId;
    }
  };

  const renderVisits = () => {
    const visits = readJson(VISIT_KEY, []);
    visitList.innerHTML = visits.length
      ? visits.map((item) => `<div class="property-card"><b>${item.title}</b> booked for <b>${new Date(item.date).toLocaleString()}</b></div>`).join('')
      : '<p>No visits booked yet.</p>';
  };

  const renderVideoVisits = () => {
    const videoVisits = readJson(VIDEO_VISIT_KEY, []);
    videoVisitList.innerHTML = videoVisits.length
      ? videoVisits.map((item) => `<div class="property-card"><b>${item.title || item.listingId}</b> video visit for <b>${new Date(item.preferredAt || item.createdAt).toLocaleString()}</b></div>`).join('')
      : '<p>No live video visit requests yet.</p>';
  };

  const renderCallMasks = (items) => {
    callMaskList.innerHTML = items.length
      ? items.map((item) => `<div class="property-card"><span><b>${item.propertyTitle || item.agentId || 'Masked Call'}</b><br>Masked Number: ${item.maskedNumber || 'Pending'}<br>Expires: ${item.expiresAt ? new Date(item.expiresAt).toLocaleString() : 'N/A'}</span></div>`).join('')
      : '<p>No call masking request yet.</p>';
  };

  const loadCallMasks = async () => {
    const token = live.getAnyToken ? live.getAnyToken() : '';
    if (token && live.request) {
      try {
        const response = await live.request('/call-mask/mine', { token });
        const items = Array.isArray(response?.items) ? response.items : [];
        writeJson(CALL_MASK_KEY, items);
        renderCallMasks(items);
        return;
      } catch {
        // fallback
      }
    }
    renderCallMasks(readJson(CALL_MASK_KEY, []));
  };

  const renderChat = (items) => {
    chatBox.innerHTML = items.length
      ? items.map((item) => `<p><b>${item.sender || 'You'}:</b> ${item.message}</p>`).join('')
      : '<p>No chat messages yet.</p>';
    chatBox.scrollTop = chatBox.scrollHeight;
  };

  const loadChat = async (propertyId) => {
    if (!propertyId) {
      renderChat([]);
      return;
    }
    const token = live.getAnyToken ? live.getAnyToken() : '';
    if (token && live.request) {
      try {
        const response = await live.request(`/chat/${encodeURIComponent(propertyId)}`, { token });
        const liveItems = (response?.items || []).map((item) => ({
          sender: item.senderName || 'User',
          message: item.message || '',
        }));
        writeJson(`${CHAT_KEY}:${propertyId}`, liveItems);
        renderChat(liveItems);
        return;
      } catch {
        // fallback below
      }
    }
    renderChat(readJson(`${CHAT_KEY}:${propertyId}`, []));
  };

  const sendMessage = async () => {
    const msg = String(chatInput?.value || '').trim();
    if (!msg) return;
    if (directPhonePattern.test(msg) || directEmailPattern.test(msg)) {
      window.alert('Direct phone/email sharing blocked. Please use in-app chat or call masking.');
      return;
    }
    if (spamWords.some((word) => msg.toLowerCase().includes(word))) {
      window.alert('Message blocked by anti-spam filter.');
      return;
    }
    const propertyId = propertySelect?.value || activePropertyId;
    if (!propertyId) {
      window.alert('Message bhejne se pehle property select karein.');
      return;
    }

    const token = live.getAnyToken ? live.getAnyToken() : '';
    let sentLive = false;
    if (token && live.request) {
      try {
        await live.request('/chat/send', {
          method: 'POST',
          token,
          data: { propertyId, message: msg },
        });
        sentLive = true;
      } catch (error) {
        if (!live.shouldFallbackToLocal || !live.shouldFallbackToLocal(error)) {
          window.alert(error.message || 'Message send failed.');
          return;
        }
      }
    }

    const key = `${CHAT_KEY}:${propertyId}`;
    const localItems = readJson(key, []);
    localItems.push({ sender: 'You', message: msg, at: new Date().toISOString(), source: sentLive ? 'live' : 'local' });
    writeJson(key, localItems);
    chatInput.value = '';
    renderChat(localItems);
  };

  const bookVisit = async (propertyId, dateValue) => {
    const listing = listings.find((item) => item.id === propertyId);
    const token = live.getAnyToken ? live.getAnyToken() : '';
    if (token && live.request) {
      try {
        await live.request(`/properties/${encodeURIComponent(propertyId)}/visit`, {
          method: 'POST',
          token,
          data: {
            preferredAt: new Date(dateValue).toISOString(),
            note: 'Booked from user dashboard',
          },
        });
      } catch (error) {
        if (!live.shouldFallbackToLocal || !live.shouldFallbackToLocal(error)) {
          window.alert(error.message || 'Visit booking failed.');
          return false;
        }
      }
    }

    const visits = readJson(VISIT_KEY, []);
    visits.unshift({
      propertyId,
      title: listing?.title || propertyId,
      date: dateValue,
      createdAt: new Date().toISOString(),
    });
    writeJson(VISIT_KEY, visits.slice(0, 50));
    return true;
  };

  const loadListings = async () => {
    if (live.syncLocalListingsFromApi) {
      try {
        await live.syncLocalListingsFromApi();
      } catch {
        // keep local data
      }
    }
    listings = readJson('propertySetu:listings', [])
      .filter((item) => String(item?.city || 'Udaipur').toLowerCase().includes('udaipur'))
      .map(normalizeListing);
  };

  wishlistDiv.addEventListener('click', (event) => {
    const target = event.target;
    if (!(target instanceof HTMLElement)) return;
    const id = target.getAttribute('data-remove-id');
    if (!id) return;
    const marketState = readJson(MARKET_STATE_KEY, { wishlist: [], compare: [], visits: [] });
    marketState.wishlist = (marketState.wishlist || []).filter((item) => item !== id);
    writeJson(MARKET_STATE_KEY, marketState);
    renderWishlist();
  });

  propertySelect.addEventListener('change', () => {
    activePropertyId = propertySelect.value;
    loadChat(activePropertyId);
  });

  refreshCallMaskBtn?.addEventListener('click', () => {
    loadCallMasks();
  });

  visitForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    const propertyId = propertySelect.value;
    const date = visitDate.value;
    if (!propertyId || !date) {
      window.alert('Select property and date/time.');
      return;
    }
    const ok = await bookVisit(propertyId, date);
    if (!ok) return;
    renderVisits();
    window.alert('Visit booked successfully.');
    visitForm.reset();
    propertySelect.value = propertyId;
  });

  window.sendMessage = sendMessage;

  loadListings().then(() => {
    renderPropertySelect();
    renderWishlist();
    renderVisits();
    renderVideoVisits();
    loadCallMasks();
    if (!activePropertyId) activePropertyId = propertySelect.value;
    loadChat(activePropertyId);
  });
})();
</script>

<script src="js/dashboard-v3-tools.js"></script>
<script src="js/sealed-bid-v3-tools.js"></script>
<script src="js/folder-command-dock.js"></script>
</body>
</html>
