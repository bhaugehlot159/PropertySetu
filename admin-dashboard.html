<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertySetu – Admin Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { font-family: "Manrope", "Plus Jakarta Sans", sans-serif; margin:0; padding:0; background:#f4f6f9; }
header { background:#0b3d91; color:white; padding:15px; text-align:center; font-size:24px; }
.container { max-width: 1000px; margin:20px auto; background:white; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
h2 { color:#0b3d91; }
button { background:#0b3d91; color:white; padding:6px 10px; border:none; border-radius:4px; cursor:pointer; margin-right:5px; }
button:hover { background:#092f6d; }
.property-card { border:1px solid #ccc; padding:10px; margin:10px 0; border-radius:6px; background:#fdfdfd; }
.badge { background:#eaf1ff; color:#123d83; border-radius:6px; padding:2px 8px; font-size:12px; }
.backup-panel { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
#backupStatus { font-size:14px; color:#123d83; }
</style>
</head>
<body>

<header>PropertySetu Admin Dashboard</header>
<div style="text-align:center;padding:10px;background:#eaf1ff;">
  <a href="index.html">Home</a> | <a href="add-property.html">Add Property</a> | <a href="dashboard.html">User Dashboard</a> | <a href="seller-dashboard.html">Seller Dashboard</a>
</div>

<div class="container">
  <h2>Pending Property Approvals</h2>
  <div id="pendingProperties"></div>
</div>

<div class="container">
  <h2>Approved / Featured Listings</h2>
  <div id="approvedProperties"></div>
</div>

<div class="container">
  <h2>Local Data Backup</h2>
  <div class="backup-panel">
    <button id="downloadLocalDataBtn">Download Local Data File (.json)</button>
    <span id="backupStatus">Browser me jo data saved hai, uska JSON backup yahan se download hoga.</span>
  </div>
</div>

<script src="js/live-api.js"></script>
<script>
(() => {
  const live = window.PropertySetuLive || {};
  const LISTINGS_KEY = 'propertySetu:listings';
  const BASE_BACKUP_KEYS = [
    'propertySetu:listings',
    'propertySetu:addPropertyDraft',
    'propertySetu:notifications',
    'propertySetu:notified',
    'propertysetu-marketplace-state',
    'propertysetu-customer-session',
    'propertysetu-admin-session',
    'propertysetu-seller-session',
    'properties',
    'favorites',
  ];

  const backupStatus = document.getElementById('backupStatus');
  const pendingDiv = document.getElementById('pendingProperties');
  const approvedDiv = document.getElementById('approvedProperties');

  const readJson = live.readJson || ((key, fallback) => {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch {
      return fallback;
    }
  });
  const writeJson = live.writeJson || ((key, value) => localStorage.setItem(key, JSON.stringify(value)));

  const isUdaipurListing = (item) => String(item?.city || 'Udaipur').toLowerCase().includes('udaipur');
  const normalizeApi = (item) => (live.normalizeApiListing ? live.normalizeApiListing(item) : item);
  const getAdminToken = () => (live.getToken ? live.getToken('admin') : '');
  const formatPrice = (value) => `₹${Number(value || 0).toLocaleString('en-IN')}`;

  const safeParse = (value) => {
    try {
      return JSON.parse(value);
    } catch {
      return value;
    }
  };

  const getBackupKeys = () => {
    const keys = new Set(BASE_BACKUP_KEYS);
    for (let index = 0; index < localStorage.length; index += 1) {
      const key = localStorage.key(index);
      if (!key) continue;
      const normalized = key.toLowerCase();
      if (normalized.includes('propertysetu') || key === 'properties' || key === 'favorites') keys.add(key);
    }
    return [...keys];
  };

  const downloadLocalData = () => {
    const storageData = {};
    getBackupKeys().forEach((key) => {
      const value = localStorage.getItem(key);
      if (value !== null) storageData[key] = safeParse(value);
    });
    if (!Object.keys(storageData).length) {
      if (backupStatus) backupStatus.textContent = 'Backup skipped: local data nahi mila.';
      return;
    }

    const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
    const fileName = `propertysetu-local-data-${timestamp}.json`;
    const payload = { app: 'PropertySetu', exportedAt: new Date().toISOString(), storage: storageData };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const anchor = document.createElement('a');
    anchor.href = url;
    anchor.download = fileName;
    document.body.appendChild(anchor);
    anchor.click();
    anchor.remove();
    URL.revokeObjectURL(url);
    if (backupStatus) backupStatus.textContent = `Backup saved: ${fileName}`;
  };

  const getLocalListings = () => readJson(LISTINGS_KEY, []).filter(isUdaipurListing);

  const syncLocalListings = (items) => {
    const normalized = items.map(normalizeApi).filter(Boolean);
    const existing = readJson(LISTINGS_KEY, []);
    const merged = live.mergeById ? live.mergeById(normalized, existing) : [...normalized, ...existing];
    writeJson(LISTINGS_KEY, merged);
  };

  const fetchListings = async () => {
    const token = getAdminToken();
    if (!token || !live.request) return getLocalListings();
    try {
      const response = await live.request('/admin/properties', { token });
      const items = Array.isArray(response?.items) ? response.items : [];
      syncLocalListings(items);
      return items.map(normalizeApi).filter(isUdaipurListing);
    } catch (error) {
      if (backupStatus) backupStatus.textContent = `Live admin API unavailable: ${error.message}`;
      return getLocalListings();
    }
  };

  const updateStatus = async (id, status) => {
    const token = getAdminToken();
    let apiUpdated = false;
    if (token && live.request) {
      try {
        await live.request(`/properties/${encodeURIComponent(id)}/approve`, {
          method: 'POST',
          token,
          data: { status },
        });
        apiUpdated = true;
      } catch (error) {
        if (!live.shouldFallbackToLocal || !live.shouldFallbackToLocal(error)) {
          window.alert(error.message || 'Status update failed.');
          return;
        }
      }
    }

    const listings = getLocalListings();
    const updated = listings.map((item) => (item.id === id ? { ...item, status, verified: status === 'Approved' } : item));
    writeJson(LISTINGS_KEY, updated);
    if (apiUpdated && backupStatus) backupStatus.textContent = `Listing ${id} updated live + local.`;
    await render();
  };

  const markFeatured = async (id) => {
    const token = getAdminToken();
    if (!token || !live.request) {
      window.alert('Live feature mark ke liye admin login required.');
      return;
    }
    try {
      await live.request(`/properties/${encodeURIComponent(id)}/feature`, {
        method: 'POST',
        token,
        data: { days: 30 },
      });
      await render();
    } catch (error) {
      window.alert(error.message || 'Feature update failed.');
    }
  };

  const renderList = (items, type) => {
    const div = type === 'pending' ? pendingDiv : approvedDiv;
    if (!div) return;
    if (!items.length) {
      div.innerHTML = type === 'pending' ? '<p>No pending properties.</p>' : '<p>No approved properties yet.</p>';
      return;
    }

    div.innerHTML = '';
    items.forEach((prop) => {
      const card = document.createElement('div');
      card.className = 'property-card';
      card.innerHTML = `
        <h3>
          ${prop.title || 'Untitled'}
          ${type === 'approved' ? '<span class="badge">Approved</span>' : ''}
          ${prop.featured ? '<span class="badge">Featured</span>' : ''}
        </h3>
        <p><b>City:</b> Udaipur</p>
        <p><b>Category:</b> ${prop.category || '-'}</p>
        <p><b>Location:</b> ${prop.location || prop.locality || '-'}</p>
        <p><b>Price:</b> ${formatPrice(prop.price)}</p>
        <p><b>Status:</b> ${prop.status || 'Pending Approval'}</p>
        <div>
          ${type === 'pending' ? `<button data-action="approve" data-id="${prop.id}">Approve ✅</button><button data-action="reject" data-id="${prop.id}">Reject ❌</button>` : ''}
          <button data-action="feature" data-id="${prop.id}">Mark Featured ⭐</button>
        </div>
      `;
      div.appendChild(card);
    });
  };

  const render = async () => {
    const listings = await fetchListings();
    const pending = listings.filter((item) => String(item.status || 'Pending Approval').toLowerCase() !== 'approved');
    const approved = listings.filter((item) => String(item.status || '').toLowerCase() === 'approved');
    renderList(pending, 'pending');
    renderList(approved, 'approved');
  };

  document.getElementById('downloadLocalDataBtn')?.addEventListener('click', downloadLocalData);
  pendingDiv?.addEventListener('click', async (event) => {
    const target = event.target;
    if (!(target instanceof HTMLElement)) return;
    const action = target.getAttribute('data-action');
    const id = target.getAttribute('data-id');
    if (!action || !id) return;
    if (action === 'approve') await updateStatus(id, 'Approved');
    if (action === 'reject') await updateStatus(id, 'Rejected');
    if (action === 'feature') await markFeatured(id);
  });

  approvedDiv?.addEventListener('click', async (event) => {
    const target = event.target;
    if (!(target instanceof HTMLElement)) return;
    const action = target.getAttribute('data-action');
    const id = target.getAttribute('data-id');
    if (action === 'feature' && id) await markFeatured(id);
  });

  render();
})();
</script>

</body>
</html>
