<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertySetu – Admin Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f6f9; }
header { background:#0b3d91; color:white; padding:15px; text-align:center; font-size:24px; }
.container { max-width: 1000px; margin:20px auto; background:white; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
h2 { color:#0b3d91; }
button { background:#0b3d91; color:white; padding:6px 10px; border:none; border-radius:4px; cursor:pointer; margin-right:5px; }
button:hover { background:#092f6d; }
.property-card { border:1px solid #ccc; padding:10px; margin:10px 0; border-radius:6px; background:#fdfdfd; }
.badge { background:#eaf1ff; color:#123d83; border-radius:6px; padding:2px 8px; font-size:12px; }
</style>
</head>
<body>

<header>PropertySetu Admin Dashboard</header>
<div style="text-align:center;padding:10px;background:#eaf1ff;">
  <a href="index.html">Home</a> | <a href="add-property.html">Add Property</a> | <a href="dashboard.html">User Dashboard</a> | <a href="seller-dashboard.html">Seller Dashboard</a>
</div>

<div class="container">
  <h2>Pending Property Approvals</h2>
  <div id="pendingProperties"></div>
</div>

<div class="container">
  <h2>Approved / Featured Listings</h2>
  <div id="approvedProperties"></div>
</div>

<script>
const LISTINGS_KEY = 'propertySetu:listings';

const readJson = (key, fallback) => {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
};

const writeJson = (key, value) => {
  localStorage.setItem(key, JSON.stringify(value));
};

const updateStatus = (id, status) => {
  const listings = readJson(LISTINGS_KEY, []);
  const updated = listings.map((item) => item.id === id ? { ...item, status } : item);
  writeJson(LISTINGS_KEY, updated);
  render();
};

const render = () => {
  const listings = readJson(LISTINGS_KEY, []);
  const pending = listings.filter((item) => (item.status || 'Pending Approval') !== 'Approved');
  const approved = listings.filter((item) => item.status === 'Approved');

  const pendingDiv = document.getElementById('pendingProperties');
  const approvedDiv = document.getElementById('approvedProperties');

  pendingDiv.innerHTML = pending.length ? '' : '<p>No pending properties.</p>';
  approvedDiv.innerHTML = approved.length ? '' : '<p>No approved properties yet.</p>';

  pending.forEach((prop) => {
    const card = document.createElement('div');
    card.className = 'property-card';
    card.innerHTML = `
      <h3>${prop.title || 'Untitled'}</h3>
      <p><b>Owner city:</b> ${prop.city || '-'}</p>
      <p><b>Category:</b> ${prop.category || '-'}</p>
      <p><b>Price:</b> ₹${Number(prop.price || 0).toLocaleString('en-IN')}</p>
      <button onclick="updateStatus('${prop.id}','Approved')">Approve ✅</button>
      <button onclick="updateStatus('${prop.id}','Rejected')">Reject ❌</button>
    `;
    pendingDiv.appendChild(card);
  });

  approved.forEach((prop) => {
    const card = document.createElement('div');
    card.className = 'property-card';
    card.innerHTML = `
      <h3>${prop.title || 'Untitled'} <span class="badge">Approved</span></h3>
      <p><b>Category:</b> ${prop.category || '-'}</p>
      <p><b>Location:</b> ${prop.location || '-'}</p>
      <p><b>Price:</b> ₹${Number(prop.price || 0).toLocaleString('en-IN')}</p>
    `;
    approvedDiv.appendChild(card);
  });
};

window.updateStatus = updateStatus;
render();
</script>

</body>
</html>
