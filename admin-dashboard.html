<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertySetu – Admin Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f6f9; }
header { background:#0b3d91; color:white; padding:15px; text-align:center; font-size:24px; }
.container { max-width: 1000px; margin:20px auto; background:white; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
h2 { color:#0b3d91; }
button { background:#0b3d91; color:white; padding:5px 10px; border:none; border-radius:4px; cursor:pointer; margin-right:5px; }
button:hover { background:#092f6d; }
.property-card { border:1px solid #ccc; padding:10px; margin:10px 0; border-radius:6px; background:#fdfdfd; }
.featured-badge { background:gold; color:black; padding:2px 6px; font-weight:bold; border-radius:4px; font-size:12px; }
.bid-card { border:1px dashed #0b3d91; padding:8px; margin:5px 0; border-radius:4px; background:#e0ebf7; }
</style>
</head>
<body>

<header>PropertySetu Admin Dashboard</header>

<div class="container">
<h2>Pending Property Approvals</h2>
<div id="pendingProperties"></div>
</div>

<div class="container">
<h2>Featured Listings & Hidden Bidding</h2>
<div id="featuredBids"></div>
</div>

<div class="container">
<h2>Seller Bids Overview</h2>
<div id="sellerBids"></div>
</div>

<script>
// === Dummy Data ===
let pendingPropertiesData = [
    {id:1, title:"Luxury Villa Hiran Magri", owner:"Seller1", category:"Buy", featured:false},
    {id:2, title:"Farmhouse Ambamata", owner:"Seller2", category:"Farm House", featured:true},
];

let biddingData = [
    {propertyId:1, bidder:"Buyer1", amount:2500000},
    {propertyId:1, bidder:"Seller2", amount:2400000},
    {propertyId:2, bidder:"Buyer3", amount:1500000}
];

let sellerBids = [
    {propertyId:1, seller:"Seller2", bidAmount:2400000, status:"Pending"},
    {propertyId:2, seller:"Seller3", bidAmount:1600000, status:"Pending"}
];

// === Pending Property Approval ===
const pendingDiv = document.getElementById('pendingProperties');
pendingPropertiesData.forEach(prop => {
    const card = document.createElement('div');
    card.className = 'property-card';
    card.innerHTML = `
        <h3>${prop.title}</h3>
        <p><b>Owner:</b> ${prop.owner}</p>
        <p><b>Category:</b> ${prop.category}</p>
        <button onclick="approveProperty(${prop.id}, this)">Approve ✅</button>
        <button onclick="rejectProperty(${prop.id}, this)">Reject ❌</button>
    `;
    pendingDiv.appendChild(card);
});

function approveProperty(id, btn){
    alert("Property ID "+id+" Approved ✅");
    btn.parentElement.remove();
}
function rejectProperty(id, btn){
    alert("Property ID "+id+" Rejected ❌");
    btn.parentElement.remove();
}

// === Featured Listings & Hidden Bidding ===
const featuredDiv = document.getElementById('featuredBids');
biddingData.forEach(bid => {
    const card = document.createElement('div');
    card.className = 'bid-card';
    card.innerHTML = `
        <p><b>Property ID:</b> ${bid.propertyId}</p>
        <p><b>Bidder:</b> ${bid.bidder}</p>
        <p><b>Bid Amount:</b> Hidden 🔒</p>
        <button onclick="revealBid(${bid.propertyId}, '${bid.bidder}', ${bid.amount})">Reveal Amount</button>
    `;
    featuredDiv.appendChild(card);
});

function revealBid(propId, bidder, amount){
    alert(`Property ${propId} - Bidder: ${bidder} - Amount: ₹${amount}`);
}

// === Seller Bids Overview ===
const sellerDiv = document.getElementById('sellerBids');
sellerBids.forEach(s => {
    const card = document.createElement('div');
    card.className = 'bid-card';
    card.innerHTML = `
        <p><b>Property ID:</b> ${s.propertyId}</p>
        <p><b>Seller:</b> ${s.seller}</p>
        <p><b>Bid Amount:</b> Hidden 🔒</p>
        <button onclick="acceptSellerBid(${s.propertyId}, '${s.seller}', ${s.bidAmount}, this)">Accept Bid</button>
        <button onclick="rejectSellerBid(${s.propertyId}, '${s.seller}', ${s.bidAmount}, this)">Reject Bid</button>
    `;
    sellerDiv.appendChild(card);
});

function acceptSellerBid(propId, seller, amount, btn){
    alert(`Accepted Seller Bid: Property ${propId}, Seller ${seller}, Amount ₹${amount}`);
    btn.parentElement.remove();
}
function rejectSellerBid(propId, seller, amount, btn){
    alert(`Rejected Seller Bid: Property ${propId}, Seller ${seller}, Amount ₹${amount}`);
    btn.parentElement.remove();
}
</script>

</body>
</html>
