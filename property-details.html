<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Details</title>
<link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/professional-folder.css" />
</head>
<body>

<header>
<h2>Property Details</h2>
</header>

<section class="section" style="text-align:center;">

<h2 id="propertyTitle"></h2>
<p id="propertyLocation"></p>
<p id="propertyPrice"></p>

<img id="propertyImage" style="width:60%; max-width:500px; border-radius:10px;">

<br><br>

<a id="whatsappLink" target="_blank">
<button style="padding:10px 20px; background:#25D366; color:white; border:none; border-radius:5px;">
Contact on WhatsApp
</button>
</a>
<p style="margin-top:10px;color:#1d4068;"><b>Privacy:</b> Direct phone number public me show nahi hota. In-app chat aur call masking use karein.</p>

<div style="margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
  <button id="openInAppChatBtn" style="padding:10px 20px; background:#0b5c8a; color:white; border:none; border-radius:5px;">Open In-App Chat</button>
  <button id="reportListingBtn" style="padding:10px 20px; background:#8d1e1e; color:white; border:none; border-radius:5px;">Report Listing</button>
  <button id="bookInspectionBtn" style="padding:10px 20px; background:#0b3d91; color:white; border:none; border-radius:5px;">Book Inspection Slot</button>
  <button id="tokenSlotBtn" style="padding:10px 20px; background:#1f7a45; color:white; border:none; border-radius:5px;">Book Token Payment Slot</button>
  <button id="digitalRentBtn" style="padding:10px 20px; background:#6b4fb3; color:white; border:none; border-radius:5px;">Digital Rent Agreement</button>
  <button id="callMaskBtn" style="padding:10px 20px; background:#124b73; color:white; border:none; border-radius:5px;">Request Call Mask</button>
</div>
<p id="callMaskStatus" style="margin-top:8px;color:#1d4068;"></p>
<p id="reportListingStatus" style="margin-top:6px;color:#1d4068;"></p>

<section style="max-width:700px;margin:28px auto 0;text-align:left;border:1px solid #d6e1f5;border-radius:10px;padding:14px;background:#f8fbff;">
  <h3 style="margin:0 0 10px;">Rating & Review Matrix</h3>
  <div style="display:grid;gap:8px;grid-template-columns:repeat(2,minmax(0,1fr));">
    <input id="reviewRating" type="number" min="1" max="5" placeholder="Overall Rating (1-5)" />
    <input id="reviewPropertyAccuracy" type="number" min="1" max="5" placeholder="Property Accuracy (1-5)" />
    <input id="reviewOwnerBehavior" type="number" min="1" max="5" placeholder="Owner Behavior (1-5)" />
    <input id="reviewAgentService" type="number" min="1" max="5" placeholder="Agent Service (1-5)" />
  </div>
  <textarea id="reviewComment" placeholder="Review comment" style="width:100%;margin-top:8px;padding:8px;"></textarea>
  <button id="submitReviewBtn" style="margin-top:8px;padding:8px 14px;background:#0b3d91;color:#fff;border:none;border-radius:5px;">Submit Review</button>
  <p id="reviewStatus" style="margin-top:8px;color:#1d4068;"></p>
  <div id="reviewSummary" style="margin-top:10px;color:#1d4068;"></div>
  <div style="display:grid;gap:8px;grid-template-columns:repeat(3,minmax(0,1fr));margin-top:10px;">
    <div style="border:1px solid #d6e1f5;border-radius:8px;padding:8px;background:#fff;"><b>Property Accuracy</b><p id="reviewAvgAccuracy" style="margin:6px 0 0;">0.00/5</p></div>
    <div style="border:1px solid #d6e1f5;border-radius:8px;padding:8px;background:#fff;"><b>Owner Behavior</b><p id="reviewAvgOwner" style="margin:6px 0 0;">0.00/5</p></div>
    <div style="border:1px solid #d6e1f5;border-radius:8px;padding:8px;background:#fff;"><b>Agent Service</b><p id="reviewAvgAgent" style="margin:6px 0 0;">0.00/5</p></div>
  </div>
  <ul id="reviewList" style="margin-top:8px;padding-left:18px;"></ul>
</section>

<section style="max-width:700px;margin:14px auto 0;text-align:left;border:1px solid #d6e1f5;border-radius:10px;padding:14px;background:#fff;">
  <h3 style="margin:0 0 10px;">Recommended Similar Properties</h3>
  <ul id="recommendedList" style="padding-left:18px;"></ul>
</section>

</section>

<script src="js/live-api.js"></script>
<script>
(() => {
  const live = window.PropertySetuLive || {};
  const params = new URLSearchParams(window.location.search);
  const hashId = String(window.location.hash || '').replace('#', '').trim();
  const queryId = String(params.get('id') || '').trim();
  const id = queryId || hashId;

  const titleEl = document.getElementById('propertyTitle');
  const locationEl = document.getElementById('propertyLocation');
  const priceEl = document.getElementById('propertyPrice');
  const imageEl = document.getElementById('propertyImage');
  const whatsappEl = document.getElementById('whatsappLink');
  const reviewSummary = document.getElementById('reviewSummary');
  const reviewList = document.getElementById('reviewList');
  const reviewStatus = document.getElementById('reviewStatus');
  const reviewAvgAccuracy = document.getElementById('reviewAvgAccuracy');
  const reviewAvgOwner = document.getElementById('reviewAvgOwner');
  const reviewAvgAgent = document.getElementById('reviewAvgAgent');
  const recommendedList = document.getElementById('recommendedList');
  const callMaskStatus = document.getElementById('callMaskStatus');
  const reportListingStatus = document.getElementById('reportListingStatus');
  const CALL_MASK_KEY = 'propertySetu:callMaskRequestsLocal';
  const REVIEW_KEY = 'propertySetu:propertyReviewsLocal';
  const REPORT_KEY = 'propertySetu:localReports';

  const readJson = live.readJson || ((key, fallback) => {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch {
      return fallback;
    }
  });
  const writeJson = live.writeJson || ((key, value) => {
    localStorage.setItem(key, JSON.stringify(value));
  });
  const reviewKey = (propertyId) => `${REVIEW_KEY}:${propertyId}`;
  const safeNumber = (value) => {
    const parsed = Number(value);
    return Number.isFinite(parsed) ? parsed : 0;
  };
  const setReviewStatus = (message, isError = false) => {
    if (!reviewStatus) return;
    reviewStatus.style.color = isError ? '#8d1e1e' : '#1d4068';
    reviewStatus.textContent = message;
  };
  const toFixedRating = (value) => `${safeNumber(value).toFixed(2)}/5`;
  const calcMatrix = (items) => {
    const list = Array.isArray(items) ? items : [];
    if (!list.length) {
      return {
        average: 0,
        matrix: { propertyAccuracy: 0, ownerBehavior: 0, agentService: 0 },
      };
    }
    const sum = (picker) => list.reduce((acc, item) => acc + safeNumber(picker(item)), 0);
    return {
      average: sum((item) => item.rating) / list.length,
      matrix: {
        propertyAccuracy: sum((item) => item.propertyAccuracy) / list.length,
        ownerBehavior: sum((item) => item.ownerBehavior) / list.length,
        agentService: sum((item) => item.agentService) / list.length,
      },
    };
  };
  const renderReviewSection = ({ total, average, matrix, items, source }) => {
    if (reviewSummary) {
      reviewSummary.textContent = `Total Reviews: ${total || 0} | Average: ${safeNumber(average).toFixed(2)} | Source: ${source}`;
    }
    if (reviewAvgAccuracy) reviewAvgAccuracy.textContent = toFixedRating(matrix?.propertyAccuracy || 0);
    if (reviewAvgOwner) reviewAvgOwner.textContent = toFixedRating(matrix?.ownerBehavior || 0);
    if (reviewAvgAgent) reviewAvgAgent.textContent = toFixedRating(matrix?.agentService || 0);
    if (reviewList) {
      reviewList.innerHTML = (items || [])
        .slice(0, 8)
        .map((item) => `<li><b>${item.userName || 'Buyer'}</b> - ${safeNumber(item.rating).toFixed(1)}/5 (Accuracy ${safeNumber(item.propertyAccuracy).toFixed(1)}, Owner ${safeNumber(item.ownerBehavior).toFixed(1)}, Agent ${safeNumber(item.agentService).toFixed(1)})<br>${item.comment || ''}</li>`)
        .join('') || '<li>No reviews yet.</li>';
    }
  };
  const saveLocalReview = (propertyId, review) => {
    const all = readJson(reviewKey(propertyId), []);
    all.unshift(review);
    writeJson(reviewKey(propertyId), all.slice(0, 200));
  };

  const formatPrice = (value) => `₹${Number(value || 0).toLocaleString('en-IN')}`;
  const setView = (item) => {
    const title = item?.title || params.get('title') || 'Property Details';
    const location = item?.location || item?.locality || params.get('location') || 'Udaipur';
    const price = item?.price || params.get('price') || 0;
    const image = item?.image || params.get('image') || 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1200&q=80';

    titleEl.innerText = title;
    locationEl.innerText = `Location: ${location}`;
    priceEl.innerText = `Price: ${formatPrice(price)}`;
    imageEl.src = image;
    whatsappEl.href = `https://wa.me/91XXXXXXXXXX?text=I am interested in ${encodeURIComponent(title)}`;
  };

  const findLocal = () => {
    if (!id) return null;
    const listings = readJson('propertySetu:listings', []);
    return listings.find((item) => item.id === id) || null;
  };

  const findLive = async () => {
    if (!id || !live.request) return null;
    try {
      const response = await live.request('/properties?city=Udaipur');
      return (response?.items || []).find((item) => item.id === id) || null;
    } catch {
      return null;
    }
  };

  setView(findLocal());
  findLive().then((item) => {
    if (item) setView(item);
  });

  const showReviews = async (propertyId) => {
    if (!propertyId) return;
    try {
      if (!live.request) throw new Error('Live API unavailable');
      const response = await live.request(`/reviews/${encodeURIComponent(propertyId)}`);
      const liveItems = Array.isArray(response?.items) ? response.items : [];
      writeJson(reviewKey(propertyId), liveItems);
      renderReviewSection({
        total: response.total || liveItems.length,
        average: response.average || 0,
        matrix: response.matrix || {},
        items: liveItems,
        source: 'Live',
      });
    } catch {
      const localItems = readJson(reviewKey(propertyId), []);
      const computed = calcMatrix(localItems);
      renderReviewSection({
        total: localItems.length,
        average: computed.average,
        matrix: computed.matrix,
        items: localItems,
        source: 'Local Fallback',
      });
    }
  };

  const submitReviewBtn = document.getElementById('submitReviewBtn');
  submitReviewBtn?.addEventListener('click', async () => {
    if (!id) return window.alert('Property id not found.');
    const rating = Number(document.getElementById('reviewRating')?.value || 0);
    const propertyAccuracy = Number(document.getElementById('reviewPropertyAccuracy')?.value || 0);
    const ownerBehavior = Number(document.getElementById('reviewOwnerBehavior')?.value || 0);
    const agentService = Number(document.getElementById('reviewAgentService')?.value || 0);
    const comment = String(document.getElementById('reviewComment')?.value || '').trim();
    const values = [rating, propertyAccuracy, ownerBehavior, agentService];
    if (values.some((v) => !Number.isFinite(v) || v < 1 || v > 5)) {
      setReviewStatus('Buyer rating submit karne ke liye sabhi matrix fields me 1-5 value deni hogi.', true);
      return;
    }

    const localRecord = {
      id: `review-local-${Date.now()}`,
      propertyId: id,
      userName: 'Local Buyer',
      rating,
      propertyAccuracy,
      ownerBehavior,
      agentService,
      comment,
      createdAt: new Date().toISOString(),
      source: 'local-fallback',
    };
    const token = live.getAnyToken ? live.getAnyToken() : '';
    if (!token || !live.request) {
      saveLocalReview(id, localRecord);
      setReviewStatus('Login/live unavailable. Buyer review local mode me save ho gaya.');
      showReviews(id);
      return;
    }
    try {
      await live.request('/reviews', {
        method: 'POST',
        token,
        data: {
          propertyId: id,
          rating,
          propertyAccuracy,
          ownerBehavior,
          agentService,
          comment,
        },
      });
      setReviewStatus('Buyer review submitted successfully (live).');
      showReviews(id);
    } catch (error) {
      saveLocalReview(id, localRecord);
      setReviewStatus(`Live review failed. Local review saved: ${error.message || 'Unknown error'}`, true);
      showReviews(id);
    }
  });

  document.getElementById('bookInspectionBtn')?.addEventListener('click', async () => {
    if (!id) return;
    const token = live.getAnyToken ? live.getAnyToken() : '';
    if (!token || !live.request) return window.alert('Inspection booking ke liye login required.');
    try {
      await live.request('/property-care/requests', {
        method: 'POST',
        token,
        data: { planId: 'care-basic', propertyId: id, location: 'Udaipur', notes: 'Inspection booking from property details.' },
      });
      window.alert('Inspection booking request submitted.');
    } catch (error) {
      window.alert(error.message || 'Inspection booking failed.');
    }
  });

  document.getElementById('tokenSlotBtn')?.addEventListener('click', async () => {
    if (!id) return;
    const token = live.getAnyToken ? live.getAnyToken() : '';
    if (!token || !live.request) return window.alert('Token payment slot ke liye login required.');
    const amount = Number(window.prompt('Token amount enter karein (₹):', '11000') || 0);
    if (!amount) return;
    try {
      await live.request('/token-payments/slot', { method: 'POST', token, data: { propertyId: id, amount } });
      window.alert('Token payment slot booked.');
    } catch (error) {
      window.alert(error.message || 'Token slot booking failed.');
    }
  });

  document.getElementById('digitalRentBtn')?.addEventListener('click', async () => {
    const token = live.getAnyToken ? live.getAnyToken() : '';
    if (!token || !live.request) return window.alert('Digital rent agreement request ke liye login required.');
    try {
      await live.request('/legal/requests', {
        method: 'POST',
        token,
        data: { templateId: 'rent-agreement', details: `Digital rent agreement request for property ${id || '-'}` },
      });
      window.alert('Digital rent agreement request submitted.');
    } catch (error) {
      window.alert(error.message || 'Digital rent agreement request failed.');
    }
  });

  document.getElementById('callMaskBtn')?.addEventListener('click', async () => {
    const token = live.getAnyToken ? live.getAnyToken() : '';
    const saveLocalMask = () => {
      const all = readJson(CALL_MASK_KEY, []);
      const serial = String(all.length + 1).padStart(4, '0').slice(-4);
      const localRecord = {
        id: `mask-local-${Date.now()}`,
        propertyId: id || null,
        propertyTitle: titleEl?.innerText || 'Property Details',
        maskedNumber: `+91-98XXXX${serial}`,
        expiresAt: new Date(Date.now() + (30 * 60000)).toISOString(),
        source: 'local-fallback',
      };
      all.unshift(localRecord);
      writeJson(CALL_MASK_KEY, all.slice(0, 100));
      return localRecord;
    };

    if (!token || !live.request) {
      const localRecord = saveLocalMask();
      if (callMaskStatus) callMaskStatus.textContent = `Login/live unavailable. Local call mask generated: ${localRecord.maskedNumber}.`;
      return;
    }

    try {
      const response = await live.request('/call-mask/request', {
        method: 'POST',
        token,
        data: {
          propertyId: id || null,
          reason: 'Property details page masked call request.',
        },
      });
      const req = response?.request || {};
      if (callMaskStatus) {
        callMaskStatus.textContent = `Masked call ready: ${req.maskedNumber || 'generated'} (valid till ${req.expiresAt ? new Date(req.expiresAt).toLocaleString() : 'N/A'}).`;
      }
    } catch (error) {
      const localRecord = saveLocalMask();
      if (callMaskStatus) callMaskStatus.textContent = `Live call masking failed. Local fallback: ${localRecord.maskedNumber}. Reason: ${error.message}`;
    }
  });

  document.getElementById('openInAppChatBtn')?.addEventListener('click', () => {
    const targetPropertyId = encodeURIComponent(id || '');
    window.location.href = `user-dashboard.html${targetPropertyId ? `?propertyId=${targetPropertyId}` : ''}`;
  });

  document.getElementById('reportListingBtn')?.addEventListener('click', async () => {
    if (!id) return;
    const reason = String(window.prompt('Report reason likhein:', 'Suspicious listing / wrong details') || '').trim();
    if (!reason) return;
    const token = live.getAnyToken ? live.getAnyToken() : '';
    const setReportStatus = (message, isError = false) => {
      if (!reportListingStatus) return;
      reportListingStatus.style.color = isError ? '#8d1e1e' : '#1d4068';
      reportListingStatus.textContent = message;
    };
    if (!token || !live.request) {
      const reports = readJson(REPORT_KEY, []);
      reports.unshift({ propertyId: id, reason, createdAt: new Date().toISOString(), source: 'local-fallback' });
      writeJson(REPORT_KEY, reports.slice(0, 200));
      setReportStatus('Login/live unavailable. Report local queue me save ho gaya.');
      return;
    }
    try {
      await live.request('/reports', {
        method: 'POST',
        token,
        data: { propertyId: id, reason },
      });
      setReportStatus('Report submitted successfully. Admin moderation queue updated.');
    } catch (error) {
      const reports = readJson(REPORT_KEY, []);
      reports.unshift({ propertyId: id, reason, createdAt: new Date().toISOString(), source: 'local-fallback', error: error.message || '' });
      writeJson(REPORT_KEY, reports.slice(0, 200));
      setReportStatus(`Live report failed. Local report saved: ${error.message || 'Unknown error'}`, true);
    }
  });

  showReviews(id);

  const loadRecommendations = async () => {
    if (!live.request || !recommendedList) return;
    try {
      const loc = encodeURIComponent(String(locationEl?.innerText || 'Udaipur').replace('Location:', '').trim() || 'Udaipur');
      const response = await live.request(`/recommendations?locality=${loc}&excludeId=${encodeURIComponent(id || '')}&limit=5`);
      const items = response?.items || [];
      recommendedList.innerHTML = items.length
        ? items.map((item) => `<li><a href="property-details.html?id=${encodeURIComponent(item.id)}">${item.title}</a> - ₹${Number(item.price || 0).toLocaleString('en-IN')}</li>`).join('')
        : '<li>No recommendation found right now.</li>';
    } catch {
      if (recommendedList) recommendedList.innerHTML = '<li>Recommendation unavailable.</li>';
    }
  };

  loadRecommendations();
})();
</script>

<script src="js/property-details-v3-tools.js"></script>
<script src="js/sealed-bid-v3-tools.js"></script>
<script src="js/folder-command-dock.js"></script>
</body>
</html>
